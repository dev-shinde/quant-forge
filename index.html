<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Quant Forge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/material-darker.min.css">
<style>
:root{
  --ink:#0b0e14; --panel:#121826; --panel2:#0e131e; --line:#1f2836; --line2:#2a3547;
  --text:#e6e9ef; --muted:#8b94a7; --faint:#5d6678;
  --cyan:#34e0d2; --violet:#a78bfa; --amber:#fbbf24;
  --good:#34d399; --bad:#f87171; --warn:#fbbf24;
  --mono:'JetBrains Mono',ui-monospace,monospace; --ui:'Space Grotesk',system-ui,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{background:var(--ink);color:var(--text);font-family:var(--ui);font-size:15px;line-height:1.55;
  -webkit-font-smoothing:antialiased;display:flex;flex-direction:column;min-height:100vh}
a{color:var(--cyan);text-decoration:none}
button{font-family:var(--ui);cursor:pointer}
.mono{font-family:var(--mono)}
.eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--faint)}

/* header */
header{display:flex;align-items:center;gap:18px;padding:14px 22px;border-bottom:1px solid var(--line);
  position:sticky;top:0;background:rgba(11,14,20,.86);backdrop-filter:blur(8px);z-index:20;flex-wrap:wrap}
.brand{display:flex;align-items:baseline;gap:10px}
.brand b{font-weight:700;font-size:18px;letter-spacing:-.01em}
.brand .spark{font-family:var(--mono);font-size:11px;color:var(--amber)}
nav{display:flex;gap:4px;flex-wrap:wrap}
nav button{background:transparent;border:1px solid transparent;color:var(--muted);padding:6px 12px;border-radius:8px;
  font-size:13px;font-weight:500;letter-spacing:.01em}
nav button:hover{color:var(--text);background:var(--panel)}
nav button.active{color:var(--ink);background:var(--cyan);border-color:var(--cyan);font-weight:600}
.spacer{flex:1}
.ghost{background:transparent;border:1px solid var(--line2);color:var(--muted);padding:6px 11px;border-radius:8px;font-size:12px}
.ghost:hover{color:var(--text);border-color:var(--cyan)}

main{flex:1;max-width:1180px;width:100%;margin:0 auto;padding:26px 22px 60px}
.view{display:none;animation:fade .25s ease}
.view.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
h1{font-size:24px;font-weight:700;letter-spacing:-.02em;margin:0 0 4px}
h2{font-size:16px;font-weight:600;margin:0 0 14px}
.sub{color:var(--muted);font-size:13px;margin:0 0 22px}

.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px}
.grid{display:grid;gap:14px}

/* today / curriculum */
.daybar{display:flex;align-items:center;gap:14px;margin-bottom:18px;flex-wrap:wrap}
.daychip{font-family:var(--mono);font-size:12px;color:var(--cyan);border:1px solid var(--line2);
  padding:5px 11px;border-radius:999px}
.focus{font-weight:600}
.banner{border:1px solid var(--amber);background:rgba(251,191,36,.07);border-radius:10px;padding:10px 14px;
  color:var(--amber);font-size:13px;margin-bottom:16px}
.plist{display:grid;gap:10px}
.prow{display:flex;align-items:center;gap:14px;background:var(--panel);border:1px solid var(--line);
  border-radius:12px;padding:13px 16px;cursor:pointer;transition:border-color .15s,transform .15s}
.prow:hover{border-color:var(--cyan);transform:translateX(2px)}
.prow .cat{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;
  padding:3px 7px;border-radius:6px;border:1px solid var(--line2)}
.cat.sql{color:var(--cyan)} .cat.proba{color:var(--violet)} .cat.stats{color:var(--amber)} .cat.apt{color:#7dd3fc}
.prow .ttl{flex:1;font-weight:500}
.prow .tag{font-family:var(--mono);font-size:11px;color:var(--faint)}
.prow .done{color:var(--good);font-size:13px}
.prow .diff{font-size:11px;color:var(--muted);font-family:var(--mono)}

/* problem view */
.pback{background:transparent;border:none;color:var(--muted);font-size:13px;padding:0;margin-bottom:14px}
.pback:hover{color:var(--cyan)}
.phead{display:flex;align-items:flex-start;gap:12px;flex-wrap:wrap;margin-bottom:6px}
.phead h1{flex:1;min-width:240px}
.statement{font-size:15px;line-height:1.65;margin:10px 0 16px}
.statement b{color:#fff;font-weight:600}
.block{margin:14px 0}
.block .lbl{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);margin-bottom:7px}
.examples,.constraints{display:grid;gap:6px}
.examples div,.constraints div{font-family:var(--mono);font-size:12.5px;color:var(--muted);
  background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:8px 11px}
.tables{display:flex;gap:14px;flex-wrap:wrap;margin:6px 0}
table.db{border-collapse:collapse;font-family:var(--mono);font-size:12px}
table.db caption{text-align:left;color:var(--cyan);font-size:11px;letter-spacing:.08em;margin-bottom:4px}
table.db th,table.db td{border:1px solid var(--line2);padding:4px 9px;text-align:left}
table.db th{background:var(--panel2);color:var(--muted);font-weight:600}
table.db td{color:var(--text)}
.dialect{border-left:2px solid var(--violet);background:rgba(167,139,250,.06);padding:9px 13px;border-radius:0 8px 8px 0;
  font-size:13px;color:#cdbdf7;margin:4px 0 0}
.dialect b{color:var(--violet)}

.editorwrap{border:1px solid var(--line2);border-radius:12px;overflow:hidden;margin:14px 0}
.CodeMirror{height:46vh!important;font-family:var(--mono)!important;font-size:13.5px;background:#0e131e!important}
.CodeMirror-gutters{background:#0b0f18!important;border-right:1px solid var(--line)!important}
.answerwrap{margin:14px 0}
.scratch{width:100%;min-height:150px;background:#0e131e;border:1px solid var(--line2);border-radius:12px;
  color:var(--text);font-family:var(--mono);font-size:13.5px;padding:12px;resize:vertical;line-height:1.6}
.scratch:focus{outline:none;border-color:var(--cyan)}
.finalrow{display:flex;align-items:center;gap:10px;margin-top:10px}
.finalrow label{font-family:var(--mono);font-size:12px;color:var(--muted)}
.finalrow input{background:#0e131e;border:1px solid var(--line2);border-radius:8px;color:var(--text);
  font-family:var(--mono);font-size:14px;padding:8px 12px;width:200px}
.finalrow input:focus{outline:none;border-color:var(--amber)}

.actions{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin:8px 0 4px}
.btn{border-radius:10px;padding:10px 18px;font-weight:600;font-size:14px;border:1px solid}
.btn.run{background:var(--cyan);color:#06201d;border-color:var(--cyan)}
.btn.run:hover{filter:brightness(1.08)}
.btn.eval{background:transparent;color:var(--violet);border-color:var(--violet)}
.btn.eval:hover{background:rgba(167,139,250,.1)}
.btn:disabled{opacity:.5;cursor:default}
.toggle{margin-left:auto;background:transparent;border:1px dashed var(--line2);color:var(--muted);
  border-radius:9px;padding:7px 13px;font-size:12px}
.toggle:hover{color:var(--amber);border-color:var(--amber)}

.running{margin-top:12px;border:1px solid var(--line2);border-radius:12px;padding:12px 15px;background:var(--panel2);
  animation:fade .2s ease}
.running .rtop{display:flex;align-items:center;gap:10px;font-size:13.5px;color:var(--text)}
.spinner{width:15px;height:15px;border-radius:50%;border:2px solid var(--line2);border-top-color:var(--cyan);
  flex:none;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.rbar{margin-top:10px;height:5px;border-radius:99px;background:var(--line);overflow:hidden;position:relative}
.rbar::after{content:"";position:absolute;left:-40%;top:0;height:100%;width:40%;border-radius:99px;
  background:linear-gradient(90deg,transparent,var(--cyan),var(--violet),transparent);animation:slide 1.15s ease-in-out infinite}
@keyframes slide{0%{left:-40%}100%{left:100%}}
.rsub{margin-top:7px;font-size:11.5px;color:var(--muted);font-family:var(--mono)}
.btn.run.busy{position:relative;color:transparent}
.btn.run.busy::after{content:"";position:absolute;inset:0;margin:auto;width:14px;height:14px;border-radius:50%;
  border:2px solid rgba(6,32,29,.35);border-top-color:#06201d;animation:spin .7s linear infinite}
.result{margin-top:14px}
.verdict{border-radius:12px;padding:12px 15px;font-size:14px;border:1px solid;margin-top:12px;white-space:pre-wrap}
.verdict.pass{border-color:var(--good);background:rgba(52,211,153,.07);color:#a7f3d0}
.verdict.fail{border-color:var(--bad);background:rgba(248,113,113,.07);color:#fecaca}
.verdict.err{border-color:var(--warn);background:rgba(251,191,36,.07);color:#fde68a}
.verdict.info{border-color:var(--line2);background:var(--panel2);color:var(--muted)}
.verdict .tagrow{margin-top:8px;display:flex;gap:6px;flex-wrap:wrap}
.tagpill{font-family:var(--mono);font-size:11px;padding:2px 8px;border-radius:6px;border:1px solid var(--violet);color:var(--violet)}
.restable{overflow:auto;border:1px solid var(--line);border-radius:10px;margin-top:10px}
.restable table{border-collapse:collapse;width:100%;font-family:var(--mono);font-size:12.5px}
.restable th{background:var(--panel2);color:var(--cyan);text-align:left;padding:7px 11px;border-bottom:1px solid var(--line2);position:sticky;top:0}
.restable td{padding:6px 11px;border-bottom:1px solid var(--line);color:var(--text)}
.playbook{margin-top:12px;border:1px solid var(--line);border-radius:12px;padding:0 16px;display:none}
.playbook.open{display:block;padding:14px 16px}
.playbook .pb{margin:10px 0}
.playbook .pb .lbl{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--amber);margin-bottom:3px}
.playbook .pb p{margin:0;font-size:13.5px;color:var(--muted)}
.playbook .pb.formula p{font-family:var(--mono);color:var(--cyan)}

/* weak points */
.levelgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.lvl{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:13px 15px}
.lvl .top{display:flex;justify-content:space-between;align-items:center;gap:8px}
.lvl .tg{font-family:var(--mono);font-size:12px;color:var(--text)}
.lvl .badge{font-size:11px;font-weight:600;font-family:var(--mono);padding:2px 9px;border-radius:999px}
.lvl .meta{font-family:var(--mono);font-size:10.5px;color:var(--faint);margin-top:6px}
.heatbar{height:7px;border-radius:999px;background:var(--line);margin-top:9px;overflow:hidden}
.heatbar i{display:block;height:100%;border-radius:999px}
.ranklist{display:grid;gap:8px;margin-top:6px}
.rankrow{display:flex;align-items:center;gap:12px;font-family:var(--mono);font-size:13px;
  background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:9px 13px}
.rankrow .n{color:var(--bad);font-weight:600;width:22px}
.rankrow .t{flex:1}
.rankrow .drill{font-size:11px;color:var(--cyan);border:1px solid var(--line2);border-radius:7px;padding:3px 9px;background:transparent}
.rankrow .drill:hover{border-color:var(--cyan)}

/* trends */
.spark{width:100%;height:90px;display:block}
.sliprow{display:flex;align-items:center;gap:12px;font-family:var(--mono);font-size:13px;padding:8px 0;border-bottom:1px solid var(--line)}
.sliprow .c{width:64px;color:var(--muted);text-transform:uppercase;font-size:11px;letter-spacing:.08em}
.sliprow .bars{flex:1;display:flex;gap:14px;align-items:center}
.sliprow .arrow{font-weight:700}
.up{color:var(--bad)} .down{color:var(--good)} .flat{color:var(--muted)}
.empty{color:var(--faint);font-family:var(--mono);font-size:13px;padding:20px;text-align:center;border:1px dashed var(--line2);border-radius:12px}
.tiny{font-size:11px;color:var(--faint);font-family:var(--mono)}
.cols2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:760px){.cols2{grid-template-columns:1fr}.CodeMirror{height:40vh!important}}
.statline{display:flex;gap:18px;flex-wrap:wrap;font-family:var(--mono);font-size:12px;color:var(--muted);margin-bottom:14px}
.statline b{color:var(--cyan)}
.legend{font-family:var(--mono);font-size:10.5px;color:var(--faint);display:flex;gap:14px;flex-wrap:wrap;margin-top:8px}
.dot{display:inline-block;width:8px;height:8px;border-radius:2px;margin-right:5px;vertical-align:middle}

/* ---- Mastery constellation ---- */
.mgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px}
.mcell{position:relative;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:15px 15px 17px;overflow:hidden}
.mcell.fresh{opacity:.62}
.mfill{position:absolute;left:0;bottom:0;height:3px;border-radius:0 3px 3px 0;transition:width .5s ease}
.mname{display:flex;align-items:center;gap:8px;font-size:13.5px;font-weight:600;color:var(--text)}
.mname i{width:9px;height:9px;border-radius:50%;display:block;flex:none;box-shadow:0 0 8px 0 currentColor}
.mscore{font-size:30px;font-weight:700;line-height:1.1;margin-top:8px;font-family:var(--mono)}
.mscore span{font-size:14px;opacity:.6;margin-left:1px}
.mcount{font-size:11.5px;color:var(--muted);font-family:var(--mono);margin-top:1px}
.mnarr{font-size:12px;color:var(--faint);margin-top:9px;line-height:1.4;min-height:32px}
.mdiff{display:flex;gap:5px;margin-top:9px}
.mdiff span{font-family:var(--mono);font-size:10px;color:var(--muted);border:1px solid var(--line2);border-radius:5px;padding:1px 6px}
.mcell .drill{position:absolute;top:12px;right:12px;background:transparent;border:1px solid var(--line2);color:var(--muted);
  border-radius:7px;padding:3px 9px;font-size:11px;font-family:var(--mono);cursor:pointer}
.mcell .drill:hover{color:var(--cyan);border-color:var(--cyan)}

/* ---- SQL command fluency ---- */
.cmdwrap{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:10px}
.cmdchip{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:12px 13px;cursor:pointer;transition:border-color .15s}
.cmdchip:hover{border-color:var(--cyan)}
.cmdtop{display:flex;align-items:center;gap:8px}
.cmdtop i{width:8px;height:8px;border-radius:50%;display:block;flex:none}
.cmdname{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--text)}
.cmdstat{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--muted)}
.cmdbar{height:4px;border-radius:99px;background:var(--line);overflow:hidden;margin:9px 0 7px}
.cmdbar i{display:block;height:100%;border-radius:99px;transition:width .5s ease}
.cmdblurb{font-size:11.5px;color:var(--faint);line-height:1.42}
.cmdlegend{font-family:var(--mono);font-size:10.5px;color:var(--faint);display:flex;gap:16px;flex-wrap:wrap;margin:2px 0 14px}
.cmdlegend i{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:5px;vertical-align:middle}

/* ---- approach hint on wrong runs ---- */
.approach{border:1px solid var(--line2);background:var(--panel2);border-left:3px solid var(--violet);
  border-radius:8px;padding:10px 13px;margin-top:10px;font-size:13px;color:var(--text);line-height:1.5}
.approach b{color:var(--violet);font-family:var(--mono);font-size:11px;letter-spacing:.5px;text-transform:uppercase;display:block;margin-bottom:3px}
.cmdused{font-family:var(--mono);font-size:11.5px;margin-top:9px;line-height:1.6}
.cmdused .ok{color:var(--good)} .cmdused .miss{color:var(--amber)}
.trainrow{font-family:var(--mono);font-size:11px;color:var(--muted);margin:6px 0 2px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.trainrow b{color:var(--faint);font-weight:400}
.trainrow span{border:1px solid var(--line2);border-radius:5px;padding:1px 7px;color:var(--cyan)}
</style>
</head>
<body>
<header>
  <div class="brand"><b>Quant&nbsp;Forge</b><span class="spark mono">⚒ temper your weak spots</span></div>
  <nav id="nav">
    <button data-v="today" class="active">Today</button>
    <button data-v="bank">Bank</button>
    <button data-v="mastery">⬡ Mastery</button>
    <button data-v="weak">Weak points</button>
    <button data-v="trends">Trends</button>
    <button data-v="drill">⌖ Drill</button>
  </nav>
  <div class="spacer"></div>
  <button class="ghost" id="expBtn">Export</button>
  <button class="ghost" id="impBtn">Import</button>
  <input type="file" id="impFile" accept="application/json" style="display:none">
</header>

<main>
  <section id="today" class="view active"></section>
  <section id="bank" class="view"></section>
  <section id="mastery" class="view"></section>
  <section id="problem" class="view"></section>
  <section id="weak" class="view"></section>
  <section id="trends" class="view"></section>
  <section id="drill" class="view"></section>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>

4,
"Dev"
]
]
},
"orderSensitive": true,
"playbook": {
"intuition": "NOT IN expands to a chain of <> ANDs. One NULL makes every comparison UNKNOWN, so nothing qualifies.",
"formula": "… WHERE NOT EXISTS (SELECT 1 FROM leavers l WHERE l.id = s.id)",
"pitfalls": "This is the classic = NULL / NOT IN trap. NOT EXISTS is NULL-safe; NOT IN is not."
}
},
{
"id": "sql-03",
"category": "sql",
"tag": "sql:window",
"title": "Top earner per department (with ties)",
"difficulty": "Medium",
"statement": "Return dept, name, salary of the **highest-paid employee(s) in each department**, including ties. Order by dept, then name.",
"examples": [
"Data: Dev 105000 (Sara/Imran 88000 excluded). Eng: Asha 120000."
],
"constraints": [
"If two people tie for the top, return both."
],
"schema": "CREATE TABLE emp(id int,name text,dept text,salary int);\nINSERT INTO emp VALUES (1,'Asha','Eng',120000),(2,'Ravi','Eng',95000),(3,'Meera','Eng',95000),(4,'Dev','Data',105000),(5,'Sara','Data',88000),(6,'Imran','Data',88000);",
"starter": "-- Schema (already seeded in-browser via PGlite):\n-- CREATE TABLE emp(id int,name text,dept text,salary int);\n-- INSERT INTO emp VALUES (1,'Asha','Eng',120000),(2,'Ravi','Eng',95000),(3,'Meera','Eng',95000),(4,'Dev','Data',105000),(5,'Sara','Data',88000),(6,'Imran','Data',88000);\n\nSELECT /* your query */ ;",
"dialectNote": "Window functions require MySQL 8.0+. On MySQL ≤5.7 you'd emulate with a correlated subquery (WHERE salary = (SELECT MAX...)).",
"expected": {
"cols": [
"dept",
"name",
"salary"
],
"rows": [
[
"Data",
"Dev",
105000
],
[
"Eng",
"Asha",
120000
]
]
},
"orderSensitive": true,
"playbook": {
"intuition": "‘Per department’ ranking → PARTITION BY dept. ‘Include ties’ → RANK or DENSE_RANK, not ROW_NUMBER (which breaks ties arbitrarily).",
"formula": "DENSE_RANK() OVER (PARTITION BY dept ORDER BY salary DESC) then keep rk=1",

}
},
{
"id": "sql-04",
"category": "sql",
"tag": "sql:window",
"title": "Running total & month-over-month",
"difficulty": "Medium",
"statement": "For each month return ym (YYYY-MM), amt, the **running total** run_tot, and the **month-over-month change** mom (this month minus previous). Order by month.",
"examples": [
"Jan 100 → run_tot 100, mom NULL. Feb 140 → run_tot 240, mom 40."
],
"constraints": [
"First month's mom is NULL."
],
"schema": "CREATE TABLE sales(mon date, amt int);\nINSERT INTO sales VALUES ('2024-01-01',100),('2024-02-01',140),('2024-03-01',120),('2024-04-01',200);",
"starter": "-- Schema (already seeded in-browser via PGlite):\n-- CREATE TABLE sales(mon date, amt int);\n-- INSERT INTO sales VALUES ('2024-01-01',100),('2024-02-01',140),('2024-03-01',120),('2024-04-01',200);\n\nSELECT /* your query */ ;",
"dialectNote": "Postgres: to_char(mon,'YYYY-MM'). MySQL: DATE_FORMAT(mon,'%Y-%m'). LAG/SUM-OVER need MySQL 8.0+.",
"expected": {
"cols": [
"ym",
"amt",
"run_tot",
"mom"
],
"rows": [
[
"2024-01",
100,
100,
null
],
[
"2024-02",
140,
240,
40
],
[
"2024-03",
120,
360,
-20
],
[
"2024-04",
200,
560,
80
]
]
},
"orderSensitive": true,
"playbook": {
"intuition": "Running total = SUM() OVER (ORDER BY mon) with the default frame (unbounded preceding → current row). MoM = current minus LAG(prev).",
"formula": "SUM(amt) OVER(ORDER BY mon); amt - LAG(amt) OVER(ORDER BY mon)",
"pitfalls": "An explicit ROWS frame matters once you add ties; default RANGE can over-sum on duplicate ORDER BY keys."
}
},
{
"id": "sql-05",
"category": "sql",
"tag": "sql:subquery-cte",
"title": "Second-highest distinct salary",
"difficulty": "Easy",
"statement": "Return the **second-highest distinct salary** as second_highest.",
"examples": [
"Salaries {120000,105000,98000,98000,95000} → second highest distinct = 105000."
],
"constraints": [
"Distinct — duplicate top values count once."
],
"schema": "CREATE TABLE emp(id int,name text,salary int);\nINSERT INTO emp VALUES (1,'Asha',120000),(2,'Ravi',95000),(3,'Meera',98000),(4,'Dev',105000),(5,'Sara',98000);",
"starter": "-- Schema (already seeded in-browser via PGlite):\n-- CREATE TABLE emp(id int,name text,salary int);\n-- INSERT INTO emp VALUES (1,'Asha',120000),(2,'Ravi',95000),(3,'Meera',98000),(4,'Dev',105000),(5,'Sara',98000);\n\nSELECT /* your query */ ;",
"dialectNote": "Subquery form is portable. LIMIT 1 OFFSET 1 works in PG & MySQL; MSSQL uses OFFSET 1 ROWS FETCH NEXT 1 ROW (or TOP).",
"expected": {
"cols": [
"second_highest"
],
"rows": [
[
105000
]
]
},
"orderSensitive": false,
"playbook": {
"intuition": "Second highest = the max of everything strictly below the overall max.",
"formula": "SELECT MAX(salary) FROM emp WHERE salary < (SELECT MAX(salary) FROM emp)",
"pitfalls": "OFFSET/LIMIT on non-distinct rows returns a duplicate, not the 2nd distinct value. Returns NULL if only one distinct salary exists — usually desired."
}
},
{
"id": "sql-06",
"category": "sql",
"tag": "sql:set-ops",
"title": "Bought but never refunded",
"difficulty": "Easy",
"statement": "Return cust ids that appear in bought but **not** in refunded, ordered by cust.",
"examples": [
"bought {1,2,3,4}, refunded {2,4} → {1,3}."
],
"constraints": [
"Set difference."
],
"schema": "CREATE TABLE bought(cust int);\nINSERT INTO bought VALUES (1),(2),(3),(4);\nCREATE TABLE refunded(cust int);\nINSERT INTO refunded VALUES (2),(4);",
"starter": "-- Schema (already seeded in-browser via PGlite):\n-- CREATE TABLE bought(cust int);\n-- INSERT INTO bought VALUES (1),(2),(3),(4);\n-- CREATE TABLE refunded(cust int);\n-- INSERT INTO refunded VALUES (2),(4);\n\nSELECT /* your query */ ;",
"dialectNote": "Postgres has EXCEPT. MySQL had NO EXCEPT until 8.0.31 — emulate with LEFT JOIN … WHERE r.cust IS NULL or NOT EXISTS. EXCEPT also de-duplicates (EXCEPT ALL keeps dups).",
"expected": {
"cols": [
"cust"
],
"rows": [
[
1
],
[
3
]
]
},
"orderSensitive": true,
"playbook": {
"intuition": "‘In A but not B’ is exactly set difference → EXCEPT.",
"formula": "SELECT cust FROM bought EXCEPT SELECT cust FROM refunded",
"pitfalls": "On MySQL this query simply won't run on older versions — know the anti-join rewrite cold."
}
},
{

"tag": "sql:window",
"title": "Latest row per user (dedup)",
"difficulty": "Medium",
"statement": "Return uid, ts, val for the **most recent event per user**. Order by uid.",
"examples": [
"User 1's latest is 2024-05-02 ('b'); user 2's is 2024-05-03 ('d')."
],
"constraints": [
"One row per user — the newest by ts."
],
"schema": "CREATE TABLE events(uid int, ts timestamp, val text);\nINSERT INTO events VALUES (1,'2024-05-01 10:00','a'),(1,'2024-05-02 09:00','b'),(2,'2024-05-01 08:00','c'),(2,'2024-05-03 08:00','d');",
"starter": "-- Schema (already seeded in-browser via PGlite):\n-- CREATE TABLE events(uid int, ts timestamp, val text);\n-- INSERT INTO events VALUES (1,'2024-05-01 10:00','a'),(1,'2024-05-02 09:00','b'),(2,'2024-05-01 08:00','c'),(2,'2024-05-03 08:00','d');\n\nSELECT /* your query */ ;",
"dialectNote": "ROW_NUMBER needs MySQL 8+. Postgres also offers DISTINCT ON (uid) … ORDER BY uid, ts DESC — a PG-only shortcut with no MySQL equivalent.",
"expected": {
"cols": [
"uid",
"ts",
"val"
],
"rows": [
[
1,
"2024-05-02T09:00:00.000Z",
"b"
],
[
2,
"2024-05-03T08:00:00.000Z",
"d"
]
]
},
"orderSensitive": true,
"playbook": {

},
{
"id": "sql-08",
"category": "sql",
"tag": "sql:window",
"title": "Longest login streak (gaps & islands)",
"difficulty": "Hard",
"statement": "For each user return uid and the length of their **longest run of consecutive daily logins** as longest_streak.",
"examples": [
"Logins Jun 1,2,3,6,7 → runs of length 3 and 2 → answer 3."
],
"constraints": [
"Consecutive = calendar days one apart."
],
"schema": "CREATE TABLE logins(uid int, d date);\nINSERT INTO logins VALUES (1,'2024-06-01'),(1,'2024-06-02'),(1,'2024-06-03'),(1,'2024-06-06'),(1,'2024-06-07');",
"starter": "-- Schema (already seeded in-browser via PGlite):\n-- CREATE TABLE logins(uid int, d date);\n-- INSERT INTO logins VALUES (1,'2024-06-01'),(1,'2024-06-02'),(1,'2024-06-03'),(1,'2024-06-06'),(1,'2024-06-07');\n\nSELECT /* your query */ ;",
"dialectNote": "Postgres: date − row_number gives a constant per island (date minus int). MySQL: subtract via DATE_SUB(d, INTERVAL rn DAY) or use TO_DAYS(d)-rn to form the group key.",
"expected": {
"cols": [
"uid",
"longest_streak"
],
"rows": [
[
1,
3
]
]
},
"orderSensitive": true,
"playbook": {
"intuition": "On a consecutive run, (date − its row number) is constant — that constant labels the island. Group by it and count.",
"formula": "grp = d - ROW_NUMBER() OVER(ORDER BY d); GROUP BY grp; MAX(COUNT)",
"pitfalls": "Cast the date arithmetic to int in PG. Reset the row_number per user with PARTITION BY uid."
}
},
{
"id": "sql-09",
"category": "sql",
"tag": "sql:joins",
"title": "Spend per customer incl. zeros",
"difficulty": "Easy",
"statement": "Return every customer's id, name, and total spend (0 if they have no orders). Order by id.",
"examples": [
"Customer C has no orders → spend 0."
],
"constraints": [
"Customers with no orders must still appear."
],
"schema": "CREATE TABLE cust(id int, name text);\nINSERT INTO cust VALUES (1,'A'),(2,'B'),(3,'C');\nCREATE TABLE ord(id int, cust_id int, total int);\nINSERT INTO ord VALUES (10,1,50),(11,1,70),(12,2,30);",
"starter": "-- Schema (already seeded in-browser via PGlite):\n-- CREATE TABLE cust(id int, name text);\n-- INSERT INTO cust VALUES (1,'A'),(2,'B'),(3,'C');\n-- CREATE TABLE ord(id int, cust_id int, total int);\n-- INSERT INTO ord VALUES (10,1,50),(11,1,70),(12,2,30);\n\nSELECT /* your query */ ;",
"dialectNote": "LEFT JOIN + COALESCE is fully portable across PG and MySQL.",
"expected": {
"cols": [
"id",
"name",
"spend"
],
"rows": [
[
1,
"A",
120
],
[
2,
"B",
30
],
[
3,
"C",
0
]
]
},
"orderSensitive": true,
"playbook": {
"intuition": "‘Every customer, even with none’ → LEFT JOIN from customers; SUM(NULL) is NULL so wrap in COALESCE(…,0).",
"formula": "cust LEFT JOIN ord … GROUP BY c.id,c.name; COALESCE(SUM(total),0)",

},
{
"id": "sql-10",
"category": "sql",
"tag": "sql:subquery-cte",
"title": "Org depth via recursive CTE",
"difficulty": "Hard",
"statement": "Using a recursive CTE, return each person's name and their **level** in the hierarchy (CEO = 1). Order by level.",
"examples": [
"CEO=1, VP=2, Dir=3, Lead=4, IC=5."
],
"constraints": [

],
"schema": "CREATE TABLE org(id int, name text, mgr int);\nINSERT INTO org VALUES (1,'CEO',NULL),(2,'VP',1),(3,'Dir',2),(4,'Lead',3),(5,'IC',4);",

"dialectNote": "WITH RECURSIVE works in Postgres and MySQL 8.0+ (the RECURSIVE keyword is required in both). MySQL caps recursion via cte_max_recursion_depth.",
"expected": {
"cols": [
"name",
"lvl"
],
"rows": [
[
"CEO",
1
],
[
"VP",
2
],
[
"Dir",
3
],
[
"Lead",
4
],
[
"IC",
5
]
]
},
"orderSensitive": true,
"playbook": {
"intuition": "Anchor = the root (mgr IS NULL) at level 1. Recursive step joins children to their parent, adding 1 each hop.",

{
"id": "prob-01",
"category": "proba",
"tag": "proba:combinatorics",
"title": "Two reds without replacement",
"difficulty": "Easy",
"statement": "A bag holds **5 red** and **3 blue** balls. You draw **2 at random without replacement**. What is P(both red)?",
"examples": [
"Total ways to pick 2 of 8 = C(8,2)=28."
],
"constraints": [],
"answer": 0.357143,
"accept": [
"5/14",
"0.357",
"0.3571",
"35.7%"
],
"tol": 0.005,
"playbook": {
"intuition": "Without replacement → count favorable pairs over total pairs, or multiply sequential probabilities 5/8 · 4/7.",
"formula": "C(5,2)/C(8,2) = 10/28 = 5/14 ≈ 0.357",
"pitfalls": "Don't use 5/8·5/8 — the second draw isn't independent (no replacement)."
}
},
{
"id": "prob-02",
"category": "proba",
"tag": "proba:bayes",
"title": "Disease test base rate",
"difficulty": "Medium",
"statement": "A disease affects **1%** of people. A test has **99% sensitivity** (P(+|disease)) and **95% specificity** (P(−|healthy)). A random person tests **positive**. What is P(disease | positive)?",
"examples": [
"Healthy false-positive rate = 1 − 0.95 = 0.05."
],
"constraints": [],
"answer": 0.166667,
"accept": [
"1/6",
"0.1667",
"0.167",
"16.7%"
],
"tol": 0.005,
"playbook": {
"intuition": "Most positives come from the huge healthy majority. Compare the tiny true-positive mass (.01·.99) to total positive mass.",
"formula": "(.99·.01)/(.99·.01 + .05·.99) = .0099/.0594 = 1/6 ≈ 0.167",
"pitfalls": "Base-rate neglect: people guess ~99%. Don't confuse P(+|disease) with P(disease|+)."
}
},

},
{
"id": "prob-04",

{

"6"

{
"id": "stat-01",
"category": "stats",
"tag": "stats:ci",
"title": "95% CI half-width",
"difficulty": "Medium",
"statement": "A sample of **n=100** has mean **50** and sd **10**. Give the **half-width** (margin of error) of the 95% confidence interval for the mean (use z=1.96).",
"examples": [
"SE = sd/√n."
],
"constraints": [],
"answer": 1.96,
"accept": [
"1.96",
"[48.04,51.96]",
"48.04 to 51.96"
],
"tol": 0.02,
"playbook": {
"intuition": "Margin = z · standard error of the mean.",
"formula": "1.96 · 10/√100 = 1.96 · 1 = 1.96 → CI [48.04, 51.96]",
"pitfalls": "Use SE = sd/√n, not sd itself. SE shrinks with √n."
}
},
{
"id": "stat-02",
"category": "stats",
"tag": "stats:distributions",
"title": "Normal tail probability",
"difficulty": "Medium",
"statement": "Scores are **N(μ=100, σ=15)**. What is P(**X > 130**)?",
"examples": [
"z = (130−100)/15 = 2."

},
{
"id": "stat-03",
"category": "stats",
"tag": "stats:inference",
"title": "Standard error of the mean",
"difficulty": "Easy",
"statement": "Population sd is **10**, sample size **n=100**. What is the **standard error of the mean**?",

"answer": 1.0,
"accept": [
"1",
"SE=1"
],
"tol": 0.001,
"playbook": {
"intuition": "SE measures variability of the sample mean, not of individuals.",
"formula": "SE = 10/√100 = 1",

},
{
"id": "stat-04",
"category": "stats",
"tag": "stats:hypothesis-test",

{
"id": "apt-04",
"category": "apt",
"tag": "apt:counting",
"title": "Arrange so two aren't adjacent",
"difficulty": "Medium",
"statement": "In how many ways can **5 distinct books** be arranged in a row so that **2 particular books are NOT adjacent**?",
"examples": [
"Total arrangements 5! = 120."
],
"constraints": [],
"answer": 72,
"accept": [
"72"
],
"tol": 0.5,
"playbook": {

/* ---------- SQL command fluency ---------- */
/* name, detection regex (on cleaned upper-case SQL), one-line beginner blurb */
const SQLCMDS=[
  ["COALESCE",   /\bCOALESCE\s*\(/,        "First non-NULL value — your go-to for turning NULLs into a default like 0."],
  ["NULLIF",     /\bNULLIF\s*\(/,          "Returns NULL when two values are equal — handy to dodge divide-by-zero."],
  ["CASE",       /\bCASE\b/,               "Inline if/else inside SQL — bucket or relabel rows on the fly."],
  ["GROUP BY",   /\bGROUP\s+BY\b/,         "Collapses rows into groups so you can aggregate per group."],
  ["HAVING",     /\bHAVING\b/,             "Filters AFTER grouping — conditions on aggregates that WHERE can't see."],
  ["JOIN",       /\bJOIN\b/,               "Combines rows from two tables on a matching key."],
  ["LEFT JOIN",  /\bLEFT\s+(OUTER\s+)?JOIN\b/, "Keeps every left-side row even with no match — pair with COALESCE for zeros."],
  ["NOT EXISTS", /\bNOT\s+EXISTS\b/,       "The NULL-safe way to ask 'rows with no match over there' (anti-join)."],
  ["EXISTS",     /\bEXISTS\b/,             "True if a correlated subquery returns any row — a semi-join."],
  ["NOT IN",     /\bNOT\s+IN\b/,           "Set-exclusion test — but a NULL in the list silently breaks it. Know the trap."],
  ["EXCEPT",     /\bEXCEPT\b/,             "Set difference — rows in A that aren't in B."],
  ["INTERSECT",  /\bINTERSECT\b/,          "Set intersection — rows common to both queries."],
  ["UNION",      /\bUNION\b/,              "Stacks two result sets (UNION dedups, UNION ALL keeps duplicates)."],
  ["WITH (CTE)", /\bWITH\b/,               "Names a subquery up front so the query reads top-to-bottom."],
  ["RECURSIVE",  /\bRECURSIVE\b/,          "A CTE that calls itself — walk hierarchies and graphs (org charts, trees)."],
  ["ROW_NUMBER", /\bROW_NUMBER\s*\(/,      "Numbers rows 1,2,3… within a partition — the dedup / latest-per-key workhorse."],
  ["RANK",       /\bRANK\s*\(/,            "Ranking that leaves gaps after ties (1,1,3)."],
  ["DENSE_RANK", /\bDENSE_RANK\s*\(/,      "Ranking with no gaps after ties (1,1,2) — top-N-per-group."],
  ["LAG",        /\bLAG\s*\(/,             "Peeks at the previous row's value — month-over-month deltas."],
  ["LEAD",       /\bLEAD\s*\(/,            "Peeks at the next row's value."],
  ["OVER",       /\bOVER\s*\(/,            "Turns an aggregate into a window — compute without collapsing rows."],
  ["PARTITION BY",/\bPARTITION\s+BY\b/,    "Restarts a window per group — 'per user', 'per dept'."],
  ["ORDER BY",   /\bORDER\s+BY\b/,         "Sorts the output (and defines window order)."],
  ["DISTINCT",   /\bDISTINCT\b/,           "Removes duplicate rows."],
  ["COUNT",      /\bCOUNT\s*\(/,           "Counts rows (COUNT(*)) or non-NULL values."],
  ["SUM",        /\bSUM\s*\(/,             "Adds up a numeric column across a group."],
  ["AVG",        /\bAVG\s*\(/,             "Averages a numeric column across a group."],
  ["ROUND",      /\bROUND\s*\(/,           "Rounds a number — watch PG numeric vs MySQL number return types."]
];
/* which commands a correct solution to each problem exercises */
const CMDTARGETS={
  "sql-01":["GROUP BY","HAVING","AVG","COUNT","ROUND","ORDER BY"],
  "sql-02":["NOT EXISTS","NOT IN","LEFT JOIN"],
  "sql-03":["DENSE_RANK","OVER","PARTITION BY","WITH (CTE)"],
  "sql-04":["SUM","OVER","LAG","ORDER BY","WITH (CTE)"],
  "sql-05":["DISTINCT","DENSE_RANK","OVER"],
  "sql-06":["EXCEPT"],
  "sql-07":["ROW_NUMBER","OVER","PARTITION BY","ORDER BY","WITH (CTE)"],
  "sql-08":["ROW_NUMBER","OVER","PARTITION BY","GROUP BY","COUNT","WITH (CTE)"],
  "sql-09":["LEFT JOIN","COALESCE","SUM","GROUP BY","ORDER BY"],
  "sql-10":["WITH (CTE)","RECURSIVE"]
};
function cleanSql(q){
  return String(q||"")
    .replace(/--[^\n]*/g,"")            // line comments
    .replace(/\/\*[\s\S]*?\*\//g,"")    // block comments
    .replace(/'[^']*'/g,"''")           // string literals
    .toUpperCase();
}
function detectCmds(q){
  const s=cleanSql(q);
  return SQLCMDS.filter(([n,re])=>re.test(s)).map(([n])=>n);
}
function cmdState(n){ return S.cmds[n]||(S.cmds[n]={seen:0,used:0,correct:0}); }
/* log a SQL attempt: credit commands used, and count exposure for the problem's targets */
function logCmds(prob,query,passed){
  const used=detectCmds(query);
  used.forEach(n=>{ const c=cmdState(n); c.used++; if(passed)c.correct++; });
  (CMDTARGETS[prob.id]||[]).forEach(n=>{ cmdState(n).seen++; });
  save();
  return used;
}
function cmdFluency(n){
  const c=S.cmds[n]||{used:0,correct:0};
  if(c.correct<=0) return 0;
  return Math.min(100, c.correct*40);   // 1 clean use =40%, 2 =80%, 3+ =100%
}
function cmdColor(n){
  const c=S.cmds[n]||{used:0,correct:0};
  if(c.correct>=3) return "#34d399";
  if(c.correct>=1) return "#fbbf24";
  if(c.used>0)     return "#f87171";   // tried but never landed it
  return "#5d6678";                     // untouched
}
function firstProblemUsing(cmd){

        || Object.keys(CMDTARGETS).find(id=>CMDTARGETS[id].includes(cmd));
  return id||null;
}

/* parse a small DDL+seed into displayable sample tables */
function parseTables(schema){
  const tables={};
  const ddl=[...schema.matchAll(/CREATE TABLE\s+(\w+)\s*\(([^)]*)\)/gi)];
  ddl.forEach(m=>{ tables[m[1]]={cols:m[2].split(",").map(c=>c.trim().split(/\s+/)[0]),rows:[]}; });
  const ins=[...schema.matchAll(/INSERT INTO\s+(\w+)[^V]*VALUES\s*([\s\S]*?);/gi)];
  ins.forEach(m=>{
    const tbl=tables[m[1]]; if(!tbl) return;
    const tuples=[...m[2].matchAll(/\(([^)]*)\)/g)];
    tuples.forEach(t=>{
      const vals=t[1].split(",").map(v=>{v=v.trim();
        if(/^null$/i.test(v))return "∅";
        return v.replace(/^'|'$/g,"");});
      tbl.rows.push(vals);
    });
  });
  return tables;
}

/* ---------- PGlite ---------- */
let pg=null, pgReady=null, pgBooting=false;
function warmPg(){ getPg().catch(()=>{}); } // fire-and-forget preload
async function getPg(){
  if(pg) return pg;
  if(!pgReady){
    pgBooting=true;
    pgReady=PGlite.create()
      .then(db=>{pg=db;pgBooting=false;return db;})
      .catch(e=>{pgReady=null;pgBooting=false;throw new Error("engine-boot: "+(e&&e.message||e));});
  }
  return pgReady;
}
async function runProblemSql(prob,query){
  const db=await getPg();
  await db.exec("DROP SCHEMA public CASCADE; CREATE SCHEMA public;");
  await db.exec(prob.schema);
  const r=await db.query(query);
  return {cols:r.fields.map(f=>f.name), rows:r.rows.map(o=>r.fields.map(f=>o[f.name]))};
}
function normCell(v){
  if(v==null) return "";
  if(typeof v==="object"){ try{return new Date(v).toISOString();}catch(e){return JSON.stringify(v);} }
  const n=Number(v);
  if(v!=="" && !isNaN(n) && isFinite(n)) return String(Math.abs(n)<1e-9?0:+n.toFixed(6));
  return String(v).trim();
}
function rowKey(r){return r.map(normCell).join("§");}
function diffResult(got,exp,orderSensitive){
  if(got.cols.length!==exp.cols.length)
    return {ok:false,msg:`Column count mismatch — expected ${exp.cols.length}, got ${got.cols.length}.`};
  if(got.rows.length!==exp.rows.length)
    return {ok:false,msg:`Row count mismatch — expected ${exp.rows.length}, got ${got.rows.length}.`};
  if(orderSensitive){
    for(let i=0;i<exp.rows.length;i++)
      if(rowKey(got.rows[i])!==rowKey(exp.rows[i]))
        return {ok:false,msg:`Row ${i+1} differs (this problem is order-sensitive — check your ORDER BY).`};
  }else{
    const g=got.rows.map(rowKey).sort(), e=exp.rows.map(rowKey).sort();
    for(let i=0;i<e.length;i++) if(g[i]!==e[i]) return {ok:false,msg:"Result set doesn't match (values differ)."};
  }
  return {ok:true,msg:"Result matches the verified answer."};
}

/* ---------- quant numeric check ---------- */
function parseAns(raw){
  if(raw==null) return NaN;
  let s=String(raw).trim().replace(/%$/,"").replace(/[₹$,\s]/g,"");
  if(/^[-+]?\d+\/\d+$/.test(s)){const[a,b]=s.split("/");return +a/+b;}
  const n=Number(s); return isNaN(n)?NaN:n;
}
function checkQuant(prob,raw){
  const got=parseAns(raw);
  const accepts=[prob.answer,...(prob.accept||[]).map(parseAns)].filter(x=>!isNaN(x));
  if(isNaN(got)) return {ok:false,msg:"Couldn't read a number — type a final value (decimal, fraction like 5/14, or %).",hard:true};
  // percent leniency: 28 vs 0.28
  const cands=accepts.flatMap(a=>[a, a*100, a/100]);
  const ok=cands.some(a=>Math.abs(a-got)<=Math.max(prob.tol, Math.abs(a)*0.01)+1e-9);
  return ok
    ? {ok:true,msg:`Correct — ${got} matches the verified answer.`}
    : {ok:false,msg:`Not quite. Your answer ${got} ≠ verified ${prob.answer}. Re-check the method, then ⌕ Evaluate for a diagnosis.`};
}

function verdictBox(cls,msg,tags){
  const v=el("div","verdict "+cls,esc(msg));
  if(tags&&tags.length){const tr=el("div","tagrow");tags.forEach(t=>tr.appendChild(el("span","tagpill",t)));v.appendChild(tr);}
  return v;
}
function runningBox(label,sub){
  const box=el("div","running");
  const top=el("div","rtop");
  const sp=el("div","spinner"); top.appendChild(sp);
  const lab=el("span",null,label); top.appendChild(lab);
  box.appendChild(top);
  box.appendChild(el("div","rbar"));
  const s=el("div","rsub",sub||""); box.appendChild(s);
  return {box, setLabel:t=>lab.textContent=t, setSub:t=>s.textContent=t};
}
function approachBox(p){
  const intuition=(p.playbook&&p.playbook.intuition)||"";
  const firstStep=intuition.split(/(?<=[.!?])\s+/)[0]||intuition;
  const b=el("div","approach");
  b.appendChild(el("b",null,"Approach"));
  b.appendChild(el("span",null,esc(firstStep)+"  Open the playbook below for the full method — then re-run, or ⌕ Evaluate for a diagnosis of your reasoning."));
  return b;
}
function cmdFeedback(p,used){
  const targets=CMDTARGETS[p.id]||[];
  if(!targets.length) return el("div","tiny","&nbsp;");
  const usedSet=new Set(used);
  const box=el("div","cmdused");
  const got=targets.filter(t=>usedSet.has(t)), miss=targets.filter(t=>!usedSet.has(t));
  let html="";
  if(got.length) html+=`<span class="ok">✓ used: ${got.map(esc).join(", ")}</span><br>`;
  if(miss.length) html+=`<span class="miss">◦ this one also drills: ${miss.map(esc).join(", ")}</span>`;
  box.innerHTML=html||'<span class="miss">This problem drills: '+targets.map(esc).join(", ")+'</span>';
  return box;
}
function cmdCredit(p,used){
  const targets=new Set(CMDTARGETS[p.id]||[]);
  const landed=used.filter(u=>targets.has(u));
  if(!landed.length) return el("div","tiny","&nbsp;");
  const box=el("div","cmdused");
  box.innerHTML=`<span class="ok">✓ command fluency logged: ${landed.map(esc).join(", ")}</span> — check ⬡ Mastery to see it climb.`;
  return box;
}
async function doRun(p,btn,res){
  res.innerHTML=""; btn.disabled=true; const old=btn.textContent;
  if(p.category==="sql"){
    btn.classList.add("busy");
    const needsBoot = !pg;
    const r=runningBox(
      needsBoot ? "Booting the Postgres engine…" : "Running your query…",
      needsBoot ? "First run downloads the PGlite WASM (~3 MB). This happens once per session." : "Executing against real Postgres in your browser."
    );
    res.appendChild(r.box);
    try{
      if(needsBoot){ await getPg(); r.setLabel("Running your query…"); r.setSub("Engine ready. Executing against real Postgres in your browser."); }
      const got=await runProblemSql(p,cm.getValue());
      res.innerHTML="";
      const tbl=el("div","restable");
      tbl.innerHTML=`<table><thead><tr>${got.cols.map(c=>`<th>${esc(c)}</th>`).join("")}</tr></thead><tbody>${got.rows.slice(0,50).map(r=>`<tr>${r.map(v=>`<td>${esc(v==null?"NULL":v)}</td>`).join("")}</tr>`).join("")}</tbody></table>`;
      res.appendChild(tbl);
      const d=diffResult(got,p.expected,p.orderSensitive);
      res.appendChild(verdictBox(d.ok?"pass":"fail",(d.ok?"✓ ":"✗ ")+d.msg));
      const used=logCmds(p,cm.getValue(),d.ok);      // track SQL command fluency
      if(!d.ok){
        res.appendChild(approachBox(p));              // hint of approach even when wrong
        res.appendChild(cmdFeedback(p,used));         // which commands you used vs the ones this drills
      }else{
        res.appendChild(cmdCredit(p,used));           // celebrate the commands you just landed
      }
      markSolved(p,d.ok);
      recordDayScore(p.id,d.ok);
    }catch(e){
      res.innerHTML="";
      const msg=String(e&&e.message||e);
      if(msg.startsWith("engine-boot")){
        res.appendChild(verdictBox("err",
          "✗ Couldn't start the SQL engine. This is usually a network/CDN block on the PGlite WASM download — check that jsdelivr.net is reachable and that you're not opening the file via file:// (use the deployed site or `vercel dev`).\n\n"+msg));
      }else{
        res.appendChild(verdictBox("err","Postgres error · "+msg));
      }
    }
    btn.classList.remove("busy");
  }else{
    const raw=$("#finalAns").value;
    const c=checkQuant(p,raw);
    res.appendChild(verdictBox(c.ok?"pass":(c.hard?"err":"fail"),(c.ok?"✓ ":"✗ ")+c.msg));
    if(!c.ok && !c.hard) res.appendChild(approachBox(p));
    markSolved(p,c.ok);            // quant correctness not logged to topic stats (per spec)
    recordDayScore(p.id,c.ok);
  }
  btn.disabled=false; btn.textContent=old;
}
async function doEval(p,btn,res){
  res.innerHTML=""; btn.disabled=true; const old=btn.textContent; btn.textContent="evaluating…";
  const work = p.category==="sql" ? cm.getValue() : (($("#scratch").value||"")+"\n\nFINAL: "+($("#finalAns").value||""));
  try{
    const j=await judge(p,work);
    const passed=!!j.correct;
    const tags=(j.tags||[]).filter(t=>ALLTAGS.includes(t));
    res.appendChild(verdictBox(passed?"pass":"fail",
      `${passed?"✓":"✗"} ${j.verdict||""}\n\nHint: ${j.hint||"—"}`, tags));
    logEval(p,passed,tags.length?tags:(passed?[p.tag]:[p.tag]));
    recordDayScore(p.id,passed);
  }catch(e){
    res.appendChild(verdictBox("info",
      "Judge unavailable (running locally without /api/judge, or ANTHROPIC_API_KEY not set). Run still works offline.\n\n"+e.message));
  }
  btn.disabled=false; btn.textContent=old;
}
function recordDayScore(id,ok){
  const d=Math.min(S.day,30); const k="d"+d;
  const cur=S.dayScore[d]; // running avg over attempts today
  const arr=S._dayArr||(S._dayArr={}); arr[d]=arr[d]||[]; arr[d].push(ok?1:0);
  S.dayScore[d]=arr[d].reduce((a,b)=>a+b,0)/arr[d].length; save();
}

/* ---------- MASTERY CONSTELLATION ---------- */
function renderMastery(){
  const root=$("#mastery"); root.innerHTML="";
  root.appendChild(el("h1",null,"Mastery constellation"));
  root.appendChild(el("p","sub","Every topic as a node: mastery %, problems solved, and a read on where you stand. Colour = status. Even a wrong Run feeds this — you get an approach hint and partial credit, not just a ✗."));

  const solvedN=Object.keys(S.solved).length;
  const attN=Object.values(S.topics).reduce((a,t)=>a+t.att,0);
  root.appendChild(el("div","statline",
    `Solved <b>${solvedN}</b>/${BANK.length} · Logged attempts <b>${attN}</b> · Curriculum day <b>${S.day}</b>/30`));

  // legend
  const lg=el("div","cmdlegend");
  lg.innerHTML=`<span><i style="background:#5d6678"></i>fresh</span>`+
    `<span><i style="background:#f87171"></i>needs work</span>`+
    `<span><i style="background:#fbbf24"></i>close</span>`+
    `<span><i style="background:#34d399"></i>solid</span>`;
  root.appendChild(lg);

  // constellation grid (all topics, ordered by category)
  const grid=el("div","mgrid");
  ["sql","proba","stats","apt"].forEach(c=>{
    VOCAB[c].forEach(name=>{
      const tag=c+":"+name, col=CATCOLOR[c], pct=masteryPct(tag);
      const done=solvedOf(tag), total=totalOf(tag), s=S.topics[tag]||{att:0};
      const fresh=s.att===0;
      const cell=el("div","mcell"+(fresh?" fresh":""));
      const fill=el("div","mfill"); fill.style.width=Math.max(pct,fresh?0:3)+"%"; fill.style.background=col; cell.appendChild(fill);
      const nm=el("div","mname"); const dot=el("i"); dot.style.background=statusColor(tag); dot.style.color=statusColor(tag);
      nm.appendChild(dot); nm.appendChild(document.createTextNode(tag)); cell.appendChild(nm);
      const sc=el("div","mscore",pct+"<span>%</span>"); sc.style.color=fresh?"var(--faint)":col; cell.appendChild(sc);
      cell.appendChild(el("div","mcount",`${done}/${total} solved`));
      cell.appendChild(el("div","mnarr",esc(narrativeFor(tag))));
      const ds=diffSpread(tag), dr=el("div","mdiff");
      if(ds.Easy)dr.appendChild(el("span",null,ds.Easy+"E"));
      if(ds.Medium)dr.appendChild(el("span",null,ds.Medium+"M"));
      if(ds.Hard)dr.appendChild(el("span",null,ds.Hard+"H"));
      cell.appendChild(dr);
      if(total>done){
        const db=el("button","drill","drill ▸");
        db.onclick=(e)=>{e.stopPropagation();const pr=BANK.find(x=>x.tag===tag&&!S.solved[x.id]);if(pr)openProblem(pr.id);};
        cell.appendChild(db);
      }
      grid.appendChild(cell);
    });
  });
  root.appendChild(grid);
  root.appendChild(el("div","tiny","&nbsp;"));

  // ---- SQL command fluency ----
  root.appendChild(el("h1",null,"SQL command fluency"));
  root.appendChild(el("p","sub","New to SQL? This tracks the individual commands you actually land in a passing query — so you can watch COALESCE, window functions, CTEs and the rest go from grey to green. Tap any command to drill a problem that uses it."));
  const cl=el("div","cmdlegend");
  cl.innerHTML=`<span><i style="background:#5d6678"></i>untouched</span>`+
    `<span><i style="background:#f87171"></i>tried, not landed</span>`+
    `<span><i style="background:#fbbf24"></i>getting there</span>`+
    `<span><i style="background:#34d399"></i>fluent (3+ clean uses)</span>`;
  root.appendChild(cl);

  const wrap=el("div","cmdwrap");
  // sort: least-fluent & attempted first, then untouched, so focus areas surface
  const ordered=[...SQLCMDS].map(([n,re,blurb])=>({n,blurb,c:S.cmds[n]||{seen:0,used:0,correct:0},fl:cmdFluency(n)}))
    .sort((a,b)=>{
      const at=(a.c.used>0||a.c.seen>0)?0:1, bt=(b.c.used>0||b.c.seen>0)?0:1;
      if(at!==bt) return at-bt;            // touched commands first
      if(a.fl!==b.fl) return a.fl-b.fl;    // weakest first
      return 0;
    });
  ordered.forEach(({n,blurb,c,fl})=>{
    const chip=el("div","cmdchip");
    const top=el("div","cmdtop");
    const dot=el("i"); dot.style.background=cmdColor(n); top.appendChild(dot);
    top.appendChild(el("span","cmdname",n));
    top.appendChild(el("span","cmdstat",`✓${c.correct} · used ${c.used}`));
    chip.appendChild(top);
    const bar=el("div","cmdbar"); const i=el("i"); i.style.width=fl+"%"; i.style.background=cmdColor(n); bar.appendChild(i); chip.appendChild(bar);
    chip.appendChild(el("div","cmdblurb",esc(blurb)));
    chip.onclick=()=>{const id=firstProblemUsing(n); if(id)openProblem(id); else show("bank");};
    wrap.appendChild(chip);
  });
  root.appendChild(wrap);
}

/* ---------- TRENDS ---------- */
function renderTrends(){
  const root=$("#trends"); root.innerHTML="";
  root.appendChild(el("h1",null,"Trends"));
  root.appendChild(el("p","sub","Accuracy over time and per-category slip rate, early vs recent, from your Evaluate log."));
  if(S.evalLog.length<2){ root.appendChild(el("div","empty","Not enough data yet. Use ⌕ Evaluate on a few problems to populate trends.")); return; }

  // accuracy sparkline (rolling pass rate)
  const log=S.evalLog;
  let cum=0; const pts=log.map((e,i)=>{cum+=e.passed?1:0;return cum/(i+1);});
  const W=720,H=90,pad=6;
  const x=i=>pad+i*((W-2*pad)/Math.max(1,pts.length-1));
  const y=v=>H-pad-v*(H-2*pad);
  const path=pts.map((v,i)=>(i?"L":"M")+x(i).toFixed(1)+" "+y(v).toFixed(1)).join(" ");
  const card=el("div","card");
  card.appendChild(el("div","eyebrow","Accuracy (rolling)"));
  card.innerHTML+=`<svg class="spark" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <line x1="${pad}" y1="${y(0.5)}" x2="${W-pad}" y2="${y(0.5)}" stroke="#2a3547" stroke-dasharray="3 4"/>
    <path d="${path}" fill="none" stroke="var(--cyan)" stroke-width="2"/>
    ${pts.map((v,i)=>`<circle cx="${x(i).toFixed(1)}" cy="${y(v).toFixed(1)}" r="2.4" fill="${v>=0.5?'var(--good)':'var(--bad)'}"/>`).join("")}
  </svg><div class="tiny">latest rolling accuracy: ${Math.round(pts[pts.length-1]*100)}% over ${pts.length} evaluations · dashed line = 50%</div>`;
  root.appendChild(card);
  root.appendChild(el("div","tiny","&nbsp;"));

  // per-category slip rate early vs recent
  root.appendChild(el("div","eyebrow","Slip rate · early vs recent"));
  const wrap=el("div","card");
  ["sql","proba","stats","apt"].forEach(c=>{
    const entries=log.filter(e=>e.cat===c);
    const row=el("div","sliprow"); row.appendChild(el("span","c",c));
    if(entries.length<2){ row.appendChild(el("span","tiny","need ≥2 evals")); wrap.appendChild(row); return; }
    const half=Math.floor(entries.length/2);
    const slip=arr=>arr.length?arr.filter(e=>!e.passed).length/arr.length:0;
    const early=slip(entries.slice(0,half)), recent=slip(entries.slice(half));
    const dir=recent<early-0.05?["down","↓ improving"]:recent>early+0.05?["up","↑ rising"]:["flat","→ flat"];
    const bars=el("div","bars");
    bars.innerHTML=`<span class="tiny">early ${Math.round(early*100)}%</span>
      <span class="tiny">→</span><span class="tiny">recent ${Math.round(recent*100)}%</span>
      <span class="arrow ${dir[0]}">${dir[1]}</span>`;
    row.appendChild(bars); wrap.appendChild(row);
  });
  root.appendChild(wrap);
}
